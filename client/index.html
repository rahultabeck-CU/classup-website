<!doctype html>
<!-- workflow verify: CC-WEBSITE-GATE0 -->
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ClassUp — NAPLAN prep that tells you the truth</title>
    <meta name="description" content="A 30-minute diagnostic that shows exactly where your child stands — then a coach who works on those exact gaps, every time your child practises." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500;1,700;1,800&display=swap" rel="stylesheet" />

    <!-- JSON-LD: SoftwareApplication (EducationalApplication) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "applicationCategory": "EducationalApplication",
      "name": "ClassUp",
      "url": "https://classup.com.au",
      "description": "ClassUp is an AI-powered NAPLAN preparation platform for Australian primary school students in Year 5 and Year 7. A free 30-minute diagnostic identifies each child's specific gaps across Numeracy, Reading, and Language Conventions, then an adaptive AI coach works on those exact gaps every session.",
      "operatingSystem": "Web",
      "applicationSubCategory": "NAPLAN Preparation",
      "inLanguage": "en-AU",
      "audience": {
        "@type": "EducationalAudience",
        "educationalRole": "student",
        "audienceType": "Primary school students, Year 5 and Year 7, Australia"
      },
      "offers": {
        "@type": "Offer",
        "price": "59",
        "priceCurrency": "AUD",
        "priceSpecification": {
          "@type": "UnitPriceSpecification",
          "price": "59",
          "priceCurrency": "AUD",
          "unitText": "MONTH"
        },
        "description": "One plan, $59/month. No lock-in. Cancel anytime. Free diagnostic included."
      },
      "provider": {
        "@type": "Organization",
        "name": "DIVTAB Holdings Pty Ltd",
        "url": "https://classup.com.au",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Melbourne",
          "addressRegion": "VIC",
          "addressCountry": "AU"
        }
      },
      "featureList": [
        "Free 30-minute NAPLAN diagnostic",
        "Adaptive AI coaching for Numeracy, Reading, and Language Conventions",
        "Year 5 and Year 7 NAPLAN question banks",
        "Weekly parent progress report",
        "Specific mistake explanations mapped to ACARA curriculum codes"
      ]
    }
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is ClassUp?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ClassUp is an AI-powered NAPLAN preparation platform built specifically for Australian families with children in Year 5 and Year 7. It starts with a free 30-minute diagnostic that identifies exactly where a child has gaps across Numeracy, Reading, and Language Conventions. An adaptive AI coach — Luna or Leo — then works on those specific gaps in every subsequent practice session. Unlike generic worksheet apps, ClassUp never gives a child a question they have already mastered, and explains every mistake in plain language."
          }
        },
        {
          "@type": "Question",
          "name": "How does AI tutoring help with NAPLAN?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AI tutoring improves NAPLAN outcomes by personalising practice to each child's specific weak areas rather than giving every student the same questions. ClassUp's AI coaches analyse diagnostic results, select questions that target identified gaps, adapt difficulty in real time based on responses, and explain mistakes using the same language and reasoning a human tutor would use. This means a child spends zero time practising skills they have already mastered and 100% of their time on the areas that will move their NAPLAN score."
          }
        },
        {
          "@type": "Question",
          "name": "Is ClassUp better than traditional worksheets for NAPLAN preparation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, for most children. Traditional worksheets give every student the same questions regardless of what they already know, which means children waste time on skills they have mastered and often skip the areas they actually need to improve. ClassUp's free diagnostic identifies each child's specific gaps first, then every practice session targets only those gaps. Mistakes are explained immediately with specific reasoning rather than just marking an answer wrong. Independent research consistently shows that targeted, adaptive practice produces stronger learning outcomes than undifferentiated worksheet repetition."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
</html>
